version: "3.9"

services:
  # ── Veritabanı ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-transfer}
      POSTGRES_USER:     ${POSTGRES_USER:-transfer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transfer_secure_pass_123!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transfer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ── Cache / Session ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT:     3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks: [internal]

  # ── Müşteri Web App ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    networks: [internal]

  # ── Admin Panel ─────────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    networks: [internal]

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_started
      admin:
        condition: service_started
    networks:
      - internal
      - web_proxy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 60s
      timeout: 5s

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  web_proxy:
    external: true
