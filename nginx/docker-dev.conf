# ── DEV nginx config — Docker Compose servisleri arasında proxy ───────────────
# Backend:  backend:5000
# Web:      web:5173
# Admin:    admin:5174

upstream backend_dev {
    server backend:5000;
    keepalive 4;
}

upstream web_dev {
    server web:5173;
    keepalive 4;
}

upstream admin_dev {
    server admin:5174;
    keepalive 4;
}

# ── Tek port: http://localhost ────────────────────────────────────────────────
# /          → müşteri sitesi (web:5173)
# /admin     → yönetim paneli (admin:5174)
# /api/      → backend (backend:5000)
server {
    listen 80;

    # API
    location /api/ {
        proxy_pass         http://backend_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 6M;   # araç görseli yükleme (max 5MB dosya + payload)
    }

    # Admin HMR websocket
    location /admin/__vite_hmr {
        proxy_pass         http://admin_dev;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Admin panel — /admin ile başlayan her şey
    location /admin {
        proxy_pass         http://admin_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_read_timeout 120s;
    }

    # Web HMR websocket
    location /__vite_hmr {
        proxy_pass         http://web_dev;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Müşteri sitesi
    location / {
        proxy_pass         http://web_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_read_timeout 120s;
    }
}
