# ── DEV nginx config — host'ta çalışan servislere proxy ──────────────────────
# Backend:  host:5000   (npm run dev:backend)
# Web:      host:5173   (npm run dev:web)
# Admin:    host:5174   (npm run dev:admin)
#
# Docker internal DNS, ipv4=on ile zorlanır (IPv6 warn'ı önler)

resolver 127.0.0.11 ipv4=on valid=5s;

upstream backend_dev {
    server host.docker.internal:5000;
    keepalive 4;
}

upstream web_dev {
    server host.docker.internal:5173;
    keepalive 4;
}

upstream admin_dev {
    server host.docker.internal:5174;
    keepalive 4;
}

# ── Müşteri sitesi: http://localhost ─────────────────────────────────────────
server {
    listen 80;

    # Backend API
    location /api/ {
        proxy_pass         http://backend_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Vite HMR WebSocket
    location /__vite_hmr {
        proxy_pass         http://web_dev;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Vite dev server (web)
    location / {
        proxy_pass         http://web_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_read_timeout 120s;
    }
}

# ── Admin panel: http://localhost:8080 ───────────────────────────────────────
server {
    listen 8080;

    location /api/ {
        proxy_pass         http://backend_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Vite HMR WebSocket (admin)
    location /__vite_hmr {
        proxy_pass         http://admin_dev;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    location / {
        proxy_pass         http://admin_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_read_timeout 120s;
    }
}
