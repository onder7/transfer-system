# ── Müşteri web uygulaması (port 80) ─────────────────────────────────────────
server {
    listen 80;
    # server_name transfer.example.com;  # Prod'da gerçek domain girin

    # Güvenlik başlıkları
    add_header X-Content-Type-Options  nosniff   always;
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        # PayTR callback için body boyutu
        client_max_body_size 2M;
    }

    # Auth endpoint'lerine özel rate limit
    location /api/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin SPA
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass         http://admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
    }

    # Web SPA
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
    }
}

# ── Admin paneli (port 8080) — firewall ile koru ──────────────────────────────
server {
    listen 8080;
    # server_name admin.transfer.example.com;  # Prod'da subdomain veya port koruması

    add_header X-Content-Type-Options  nosniff   always;
    add_header X-Frame-Options         DENY      always;

    # API proxy (admin da aynı backend'i kullanır)
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Admin SPA
    location / {
        proxy_pass         http://admin;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
    }
}
