services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       transfer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    image: node:22-alpine
    working_dir: /app
    command: >-
      sh -c "npm install &&
      cd backend &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      cd /app &&
      npm run dev -w backend"
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/transfer_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      PORT: "5000"
    env_file:
      - ./backend/.env
    volumes:
      - .:/app
      - backend_nm:/app/node_modules
      - backend_src_nm:/app/backend/node_modules
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w apps/web -- --host 0.0.0.0"
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - web_nm:/app/node_modules
      - web_src_nm:/app/apps/web/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped

  admin:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w apps/admin -- --host 0.0.0.0"
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - admin_nm:/app/node_modules
      - admin_src_nm:/app/apps/admin/node_modules
    ports:
      - "5174:5174"
    restart: unless-stopped

  # ── Nginx dev proxy ──────────────────────────────────────────────────────────
  # Port 80   → web   (web:5173)  + /api (backend:5000)
  # Port 8080 → admin (admin:5174) + /api (backend:5000)
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/docker-dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web
      - admin

volumes:
  postgres_data:
  redis_data:
  backend_nm:
  backend_src_nm:
  web_nm:
  web_src_nm:
  admin_nm:
  admin_src_nm:
